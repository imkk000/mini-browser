<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Mini Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      background: #1e1e2e;
    }

    #tab-bar {
      display: flex;
      align-items: center;
      background: #181825;
      padding: 6px 8px 0;
      gap: 4px;
    }

    .tab {
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      color: #cdd6f4;
      background: #313244;
      border: none;
      font-size: 14px;
      transition: background 0.15s;
    }

    .tab:hover {
      background: #45475a;
    }

    .tab.active {
      background: #1e1e2e;
      color: #cba6f7;
      font-weight: bold;
    }

    #edit-config {
      margin-left: auto;
      margin-bottom: 4px;
      padding: 5px 12px;
      background: #45475a;
      color: #cdd6f4;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    #edit-config:hover {
      background: #585b70;
    }

    #views {
      flex: 1;
      position: relative;
    }

    /* Covers webviews during drag so they don't steal mouse events */
    #drag-shield {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: col-resize;
    }

    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: row;
    }

    .tab-panel.active {
      display: flex;
    }

    .tab-panel webview {
      flex: 1 1 0;
      height: 100%;
      min-width: 80px;
    }

    .pane-divider {
      width: 4px;
      background: #313244;
      flex-shrink: 0;
      cursor: col-resize;
      transition: background 0.15s;
    }

    .pane-divider:hover,
    .pane-divider.dragging {
      background: #cba6f7;
    }
  </style>
</head>

<body>
  <div id="tab-bar">
    <button id="edit-config" title="Opens apps.json in your default editor">
      ⚙ Edit Config
    </button>
  </div>
  <div id="views">
    <div id="drag-shield"></div>
  </div>

  <script>
    const tabBar = document.getElementById("tab-bar");
    const views = document.getElementById("views");
    const dragShield = document.getElementById("drag-shield");

    document.getElementById("edit-config").addEventListener("click", () => {
      window.electronAPI.openConfig();
    });

    function switchTo(index) {
      document
        .querySelectorAll(".tab")
        .forEach((t, i) => t.classList.toggle("active", i === index));
      document
        .querySelectorAll(".tab-panel")
        .forEach((p, i) => p.classList.toggle("active", i === index));
    }

    function makeDividerResizable(divider, leftWv, rightWv) {
      divider.addEventListener("mousedown", (e) => {
        e.preventDefault();
        divider.classList.add("dragging");
        dragShield.style.display = "block";

        const startX = e.clientX;
        const leftStart = leftWv.offsetWidth;
        const rightStart = rightWv.offsetWidth;

        function onMove(e) {
          const delta = e.clientX - startX;
          const newLeft = Math.max(80, leftStart + delta);
          const newRight = Math.max(80, rightStart - delta);
          leftWv.style.flex = `0 0 ${newLeft}px`;
          rightWv.style.flex = `0 0 ${newRight}px`;
        }

        function onUp() {
          divider.classList.remove("dragging");
          dragShield.style.display = "none";
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        }

        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
    }

    // Config format: [{label, panes: [{url, partition}, ...]}]
    // Single pane: panes with one entry, or shorthand panes: {url, partition}
    window.electronAPI.getApps().then((tabs) => {
      tabs.forEach((tab, i) => {
        const panes = Array.isArray(tab.panes) ? tab.panes : [tab.panes];

        const btn = document.createElement("button");
        btn.className = "tab" + (i === 0 ? " active" : "");
        btn.textContent = tab.label;
        btn.addEventListener("click", () => switchTo(i));
        tabBar.insertBefore(btn, document.getElementById("edit-config"));

        const panel = document.createElement("div");
        panel.className = "tab-panel" + (i === 0 ? " active" : "");

        const webviews = [];
        const dividers = [];
        panes.forEach((pane, j) => {
          if (j > 0) {
            const divider = document.createElement("div");
            divider.className = "pane-divider";
            panel.appendChild(divider);
            dividers.push(divider);
          }
          const wv = document.createElement("webview");
          wv.src = pane.url;
          if (pane.partition) wv.partition = pane.partition;
          wv.setAttribute("allowpopups", "");
          panel.appendChild(wv);
          webviews.push(wv);
        });

        dividers.forEach((divider, j) => {
          makeDividerResizable(divider, webviews[j], webviews[j + 1]);
        });

        views.appendChild(panel);
      });
    });
  </script>
</body>

</html>
