<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>My Apps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: sans-serif;
      background: #1e1e2e;
    }

    #tab-bar {
      display: flex;
      align-items: center;
      background: #181825;
      padding: 6px 8px 0;
      gap: 4px;
    }

    .tab {
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      color: #cdd6f4;
      background: #313244;
      border: none;
      font-size: 14px;
      transition: background 0.15s;
    }

    .tab:hover {
      background: #45475a;
    }

    .tab.active {
      background: #1e1e2e;
      color: #cba6f7;
      font-weight: bold;
    }

    #edit-config {
      margin-left: auto;
      margin-bottom: 4px;
      padding: 5px 12px;
      background: #45475a;
      color: #cdd6f4;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    #edit-config:hover {
      background: #585b70;
    }

    #views {
      flex: 1;
      position: relative;
    }

    webview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    webview.active {
      display: flex;
    }
  </style>
</head>

<body>

  <div id="tab-bar">
    <button id="edit-config" title="Opens apps.json in your default editor">⚙ Edit Config</button>
  </div>
  <div id="views"></div>

  <script>
    const tabBar = document.getElementById('tab-bar');
    const views = document.getElementById('views');

    document.getElementById('edit-config').addEventListener('click', () => {
      window.electronAPI.openConfig();
    });

    function switchTo(index) {
      document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', i === index));
      document.querySelectorAll('webview').forEach((v, i) =>
        v.classList.toggle('active', i === index));
    }

    window.electronAPI.getApps().then(apps => {
      apps.forEach((app, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (i === 0 ? ' active' : '');
        btn.textContent = app.label;
        btn.addEventListener('click', () => switchTo(i));
        // Insert before the ⚙ button
        tabBar.insertBefore(btn, document.getElementById('edit-config'));

        const wv = document.createElement('webview');
        wv.src = app.url;
        wv.partition = app.partition;
        wv.className = i === 0 ? 'active' : '';
        wv.setAttribute('allowpopups', '');
        views.appendChild(wv);
      });
    });
  </script>
</body>

</html>
